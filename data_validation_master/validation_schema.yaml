variables:

  institution: # THE IDEA WITH THIS IS TO GET ALL THE POSSIBLE UNIQUE RAW VALUES AND MAP TO A DEFAULT LIST OF VALUES
    label: "Institución"
    dtype: int
    nullable: true              # "No se registró" → null (not code 5)
    fuzzy_match: false
    encoding:
      "Hospital Pablo Tobon Uribe":                        0
      "Hospital Universitario San Vicente Fundacion":      1
      "Clinica Noel":                                      2
      "Hospital General de Medellin":                      3
      "Hospital Alma Mater de Antioquia":                  4
      "Hospital Manuel Uribe Angel":                       5
      "Hospital Marco Fidel Suarez":                       6
    transformations: *encode_transforms
    invalid_action: flag
  
  institution: # THE IDEA WITH THIS IS TO GET ALL THE POSSIBLE UNIQUE RAW VALUES AND MAP TO A DEFAULT LIST OF VALUES
    label: "Institución"
    dtype: categorical
    nullable: false
    fuzzy_match: false
    threshold: 88
    canonical: ["Hospital Pablo Tobon Uribe",
                "Hospital Universitario San Vicente Fundacion",
                "Clinica Noel",
                "Hospital General de Medellin",
                "Hospital Alma Mater de Antioquia",
                "Hospital Manuel Uribe Angel",
                "Hospital Marco Fidel Suarez"
                ]               
    transformations:
      - trim
      - smart_title_case  #??
    invalid_action: flag
    

  first_name:
    label: "Nombre(s) del paciente"
    dtype: string
    nullable: false
    dedup_key: true
    dedup_normalize: true       # generates shadow column first_name_key (lowercase, no accents)
    transformations:
      - sanitize
      - trim
      - collapse_spaces
      - smart_title_case
      - empty_to_null
    max_length: 120
    pattern: "^[\\p{L}\\s]+$"
    invalid_action: flag


  last_name:
    label: "Apellido(s) del paciente"
    dtype: string
