# MISSING TO ADD THE LABELS AND NOTES TO EACH VARIABLE

# =============================================================================
# DATA VALIDATION MASTER SCHEMA
# =============================================================================
# Convention:
#   dtype         : int | float | string | categorical | dichotomous | date
#   nullable      : true → NaN allowed | false → NaN flagged as error
#   invalid_action: flag → log to audit_log.csv and set to NaN
#   transformations run in order top to bottom
# =============================================================================

# -----------------------------------------------------------------------------
# GLOBAL: applied to every variable before any variable-level rule
# -----------------------------------------------------------------------------
global: #REVISAR QUE SI ESTEN TODOS LOS VALORES NULABLES
  null_strings:
    - "nan"
    - "NaN"
    - "NAN"
    - "NULL"
    - "null"
    - "None"
    - "none"
    - ""
    - "no se encuentra información en la historia clínica"
    - "no se encuentra informacion en la historia clinica"
    - "no se registró en la historia clínica"
    - "no reportado en la historia clínica"
    - "sin información"
    - "sin informacion"
    - "no reportado"
    - "No es posible establecer el área de residencia"
  invalid_action: flag
 # Revisar qué otros valores se pueden adicionar
 
# -----------------------------------------------------------------------------
# REUSABLE ANCHORS  (referenced with *month_encoding, *yn_coerce, etc.)
# -----------------------------------------------------------------------------
_anchors:
 
  month_encoding: &month_encoding
    "Enero (01)":       1
    "Febrero (02)":     2
    "Marzo (03)":       3
    "Abril (04)":       4
    "Mayo (05)":        5
    "Junio (06)":       6
    "Julio (07)":       7
    "Agosto (08)":      8
    "Septiembre (09)":  9
    "Octubre (10)":     10
    "Noviembre (11)":   11
    "Diciembre (12)":   12
 
  # Si/No → 1/0, null handled by global null_strings
  yn_coerce: &yn_coerce
    "si":  1
    "sí":  1
    "no":  0
 
  # shared transformations for all Si/No dichotomous variables
  yn_transforms: &yn_transforms
    - trim
    - lowercase
    - coerce
    - to_int
 
  # shared transformations for variables encoded from long text
  encode_transforms: &encode_transforms
    - trim
    - encode
 
  # shared transformations for year variables extracted from date strings
  year_transforms: &year_transforms
    - extract_year      # pd.to_datetime → .dt.year → Int64
 
